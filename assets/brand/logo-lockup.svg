<svg viewBox="0 0 920 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tooluse Labs</title>
  <desc id="desc">Open-source tools for AI agents: MCP servers, skills, and supporting tooling.</desc>
  <style>
    .wordmark { fill: #0E1618; font: 700 36px "Inter", "Segoe UI", Arial, sans-serif; letter-spacing: 0; }
    .tagline { fill: #40585A; font: 400 19px "Inter", "Segoe UI", Arial, sans-serif; letter-spacing: 0; }
    @media (prefers-color-scheme: dark) {
      .wordmark { fill: #E7FFFB; }
      .tagline { fill: #A8C7C4; }
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="10.5" y1="7.875" x2="101.5" y2="104.125" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071113"/>
      <stop offset="1" stop-color="#102426"/>
    </linearGradient>
    <linearGradient id="bracket" x1="18.375" y1="28.875" x2="93.625" y2="83.125" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8CF7EA"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="selected" x1="48.125" y1="42" x2="67.375" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD166"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <g transform="translate(24 24)">
    <rect width="112" height="112" rx="22.75" fill="url(#bg)"/>
    <rect x="3.5" y="3.5" width="105" height="105" rx="21" fill="none" stroke="#E7FFFB" stroke-opacity=".06" stroke-width=".875"/>

    <path d="M29.75 28.875 L18.375 28.875 L18.375 83.125 L29.75 83.125" fill="none" stroke="url(#bracket)" stroke-width="6.5625" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M82.25 28.875 L93.625 28.875 L93.625 83.125 L82.25 83.125" fill="none" stroke="url(#bracket)" stroke-width="6.5625" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M48.125 56.875 L65.625 69.125" fill="none" stroke="#315E5D" stroke-width="4.375" stroke-linecap="round"/>
    <path d="M48.125 56.875 L65.625 42.875" fill="none" stroke="url(#selected)" stroke-width="5.6875" stroke-linecap="round"/>
    <circle cx="65.625" cy="69.125" r="4.375" fill="#2DD4BF"/>
    <circle cx="48.125" cy="56.875" r="7" fill="#FFD166"/>
    <circle cx="65.625" cy="42.875" r="7.4375" fill="#F59E0B"/>
  </g>

  <text class="wordmark" x="162" y="68">Tooluse Labs</text>
  <text class="tagline" x="163" y="102">Open-source tools for AI agents — MCP servers, skills, and supporting tooling.</text>
