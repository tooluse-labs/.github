  <path d="M98 142 L128 112 L158 142" fill="none" stroke="#2A4F4F" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="98" cy="142" r="14" fill="url(#node)"/>
  <circle cx="128" cy="112" r="14" fill="url(#node)"/>
  <circle cx="158" cy="142" r="14" fill="url(#node)"/>
