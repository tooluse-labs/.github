<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tooluse Labs avatar v2 candidate</title>
  <desc id="desc">Cyan code brackets around an amber connected tool-call graph on a dark rounded square.</desc>
  <defs>
    <linearGradient id="bg" x1="24" y1="18" x2="232" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071113"/>
      <stop offset="1" stop-color="#102426"/>
    </linearGradient>
    <linearGradient id="bracket" x1="38" y1="64" x2="218" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8CF7EA"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="node" x1="96" y1="100" x2="160" y2="152" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD166"/>
