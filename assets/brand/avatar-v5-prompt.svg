<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tooluse Labs avatar v5 prompt candidate</title>
  <desc id="desc">Cyan code brackets around an amber terminal prompt symbol on a dark rounded square.</desc>
  <defs>
