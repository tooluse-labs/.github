<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">perfetto-mcp-rs avatar logo</title>
  <desc id="desc">Compact avatar variant of the perfetto-mcp-rs logo, reusing the main mark geometry with reduced effects for small-size display.</desc>
