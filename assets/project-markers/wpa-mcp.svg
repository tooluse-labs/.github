<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-labelledby="title desc">
  <title id="title">wpa-mcp mark</title>
  <desc id="desc">wpa-mcp mark: dark rounded badge containing a kernel-event timeline grid, an .etl trace polyline in cyan/teal/amber, and three coloured vertex markers at the trace's folding points.</desc>

  <defs>
    <linearGradient id="markFill" x1="54" y1="48" x2="266" y2="286" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="traceStroke" x1="126" y1="160" x2="186" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4CC9F0"/>
      <stop offset="0.5" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0B1020" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- Dark rounded badge -->
    <rect x="40" y="40" width="240" height="240" rx="52" fill="url(#markFill)"/>

    <!-- Kernel-event timeline grid -->
    <path d="M84 88V232M132 68V252M180 68V252M228 88V232" stroke="#1E293B" stroke-width="2"/>

    <!-- .etl trace polyline (cyan→teal→amber gradient stroke) -->
    <path d="M72 136H106L126 208L156 112L186 208L206 136H246" fill="none" stroke="url(#traceStroke)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Three vertex markers: white core + brand-colour ring -->
    <circle cx="126" cy="208" r="6" fill="#FFFFFF"/>
    <circle cx="126" cy="208" r="15" fill="none" stroke="#4CC9F0" stroke-width="3.5" opacity="0.8"/>
    <circle cx="156" cy="112" r="6" fill="#FFFFFF"/>
    <circle cx="156" cy="112" r="15" fill="none" stroke="#2DD4BF" stroke-width="3.5" opacity="0.8"/>
    <circle cx="186" cy="208" r="6" fill="#FFFFFF"/>
    <circle cx="186" cy="208" r="15" fill="none" stroke="#F59E0B" stroke-width="3.5" opacity="0.8"/>
  </g>
</svg>
